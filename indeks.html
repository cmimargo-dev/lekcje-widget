<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Widget – SP45</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #0f0505;
    --surface2:  #2d1414;
    --border:    rgba(255,255,255,0.08);
    --text:      #f5eaea;
    --muted:     #a07070;
    --accent:    #ff6b6b;
    --gold:      #ffd166;
    --glass:     rgba(42, 16, 16, 0.9); /* Zwiększona widoczność w widgecie */
  }

  body {
    width: 100%;
    min-height: 100%;
    font-family: 'DM Sans', sans-serif;
    background: transparent; /* Pozwala prześwitywać tłu Twojego systemu */
    color: var(--text);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 10px; /* Margines bezpieczeństwa dla widgetu */
  }

  .glass-container {
    background: var(--glass);
    backdrop-filter: blur(20px);
    border: 1px solid var(--border);
    border-radius: 20px; /* Nieco mniejszy promień dla mniejszych okien */
    width: 100%;
    max-width: 100%;
    padding: 20px;
    box-shadow: 0 20px 50px rgba(0,0,0,0.5);
    display: flex;
    flex-direction: column;
    gap: 15px;
  }

  /* Zmiana układu na pionowy w bardzo wąskich oknach */
  .main-grid {
    display: grid;
    grid-template-columns: 1fr; /* Jeden pod drugim dla widgetu webpage */
    gap: 10px;
  }

  /* Jeśli okno jest szersze (np. poziomy widget), wróć do dwóch kolumn */
  @media (min-width: 500px) {
    .main-grid { grid-template-columns: 1.2fr 1fr; }
  }

  .card {
    background: var(--surface2);
    border-radius: 15px;
    padding: 20px;
    border: 1px solid var(--border);
    border-top: 4px solid var(--accent);
  }

  .card-label {
    font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em;
    color: var(--muted); margin-bottom: 5px; font-weight: 600;
  }

  .card-val {
    font-family: 'DM Mono', monospace;
    font-size: clamp(30px, 10vw, 60px); /* Dynamiczna wielkość czcionki */
    font-weight: 500; line-height: 1;
    margin-bottom: 10px;
  }

  .card-footer {
    display: flex; align-items: center; gap: 8px;
    font-size: 12px; color: var(--text);
  }

  .prog-section {
    background: rgba(0,0,0,0.3);
    border-radius: 15px;
    padding: 15px;
    border: 1px solid var(--border);
  }

  .prog-info {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 10px;
  }

  .status-pill {
    display: flex; align-items: center; gap: 8px;
    background: var(--surface2);
    padding: 5px 12px; border-radius: 999px;
    font-size: 11px; font-weight: 600;
  }

  .sdot { width: 8px; height: 8px; border-radius: 50%; }
  .pulse { animation: pulse 1.5s infinite; }
  @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }

  .prog-bar {
    height: 10px; background: #000;
    border-radius: 999px; overflow: hidden;
  }
  .prog-fill {
    height: 100%; width: 0%; 
    background: linear-gradient(90deg, var(--accent), var(--gold));
    transition: width 1s ease-in-out;
  }

  .bottom-info {
    font-size: 9px; color: var(--muted);
    text-align: center;
    text-transform: uppercase;
  }

  .clr-red { color: var(--accent); }
  .clr-gold { color: var(--gold); }
  .bg-red { background: var(--accent); }
  .bg-gold { background: var(--gold); }
</style>
</head>
<body>

<div class="glass-container">
  <div class="main-grid">
    <div class="card">
      <div class="card-label" id="lbl-a">Pozostało</div>
      <div class="card-val clr-red" id="val-a">--:--</div>
      <div class="card-footer">
        <span id="emoji-a">📚</span>
        <span id="desc-a">...</span>
      </div>
    </div>

    <div class="card" style="border-top-color: var(--gold);">
      <div class="card-label" id="lbl-b">Następnie</div>
      <div class="card-val clr-gold" id="val-b" style="font-size: clamp(20px, 8vw, 40px);">--:--</div>
      <div class="card-footer">
        <span id="emoji-b">☕</span>
        <span id="desc-b">...</span>
      </div>
    </div>
  </div>

  <div class="prog-section">
    <div class="prog-info">
      <div class="status-pill">
        <div class="sdot bg-red pulse" id="sdot"></div>
        <span id="status-text">...</span>
      </div>
      <div style="font-family: 'DM Mono'; font-weight: 700; font-size: 14px; color: var(--gold)" id="prog-pct">0%</div>
    </div>
    <div class="prog-bar">
      <div class="prog-fill" id="prog-fill"></div>
    </div>
  </div>

  <div class="bottom-info">
    <span>digitaltv.sp45.pl</span>
  </div>
</div>

<script>
const SCHEDULE = [
  { type:'lesson', name:'1. lekcja',      start:'08:00', end:'08:50' },
  { type:'break',  name:'Przerwa',         start:'08:50', end:'09:00' },
  { type:'lesson', name:'2. lekcja',      start:'09:00', end:'09:45' },
  { type:'break',  name:'Przerwa',         start:'09:45', end:'09:55' },
  { type:'lesson', name:'3. lekcja',      start:'09:55', end:'10:40' },
  { type:'break',  name:'Przerwa (duża)', start:'10:40', end:'10:55' },
  { type:'lesson', name:'4. lekcja',      start:'10:55', end:'11:40' },
  { type:'break',  name:'Przerwa',         start:'11:40', end:'11:50' },
  { type:'lesson', name:'5. lekcja',      start:'11:50', end:'12:35' },
  { type:'break',  name:'Przerwa',         start:'12:35', end:'12:45' },
  { type:'lesson', name:'6. lekcja',      start:'12:45', end:'13:30' },
  { type:'break',  name:'Przerwa (duża)', start:'13:30', end:'13:50' },
  { type:'lesson', name:'7. lekcja',      start:'13:50', end:'14:35' },
  { type:'break',  name:'Przerwa',         start:'14:35', end:'14:45' },
  { type:'lesson', name:'8. lekcja',      start:'14:45', end:'15:30' },
  { type:'break',  name:'Przerwa',         start:'15:30', end:'15:40' },
];

function toSec(t) { const [h,m]=t.split(':').map(Number); return h*3600+m*60; }
function fmt(s) {
  if (s<=0) return '0:00';
  const m = Math.floor(s/60);
  const sec = s%60;
  return m + ':' + String(sec).padStart(2,'0');
}

function updateUI() {
  const now = new Date();
  const ns = now.getHours()*3600 + now.getMinutes()*60 + now.getSeconds();
  let idx = SCHEDULE.findIndex(s => ns >= toSec(s.start) && ns < toSec(s.end));

  if (idx === -1) {
    const nextIdx = SCHEDULE.findIndex(s => toSec(s.start) > ns);
    if (nextIdx === -1) {
      document.getElementById('val-a').textContent = "KONIEC";
      document.getElementById('desc-a').textContent = "Lekcje zakończone";
      document.getElementById('val-b').textContent = "--:--";
      document.getElementById('status-text').textContent = "Po zajęciach";
      document.getElementById('prog-fill').style.width = "100%";
    } else {
      const wait = toSec(SCHEDULE[nextIdx].start) - ns;
      document.getElementById('val-a').textContent = fmt(wait);
      document.getElementById('desc-a').textContent = "Start: " + SCHEDULE[nextIdx].start;
      document.getElementById('status-text').textContent = "Przed lekcjami";
    }
    return;
  }

  const current = SCHEDULE[idx];
  const remain = toSec(current.end) - ns;
  const total = toSec(current.end) - toSec(current.start);
  const pct = Math.floor(((total - remain) / total) * 100);

  document.getElementById('status-text').textContent = current.name;
  document.getElementById('val-a').textContent = fmt(remain);
  document.getElementById('desc-a').textContent = `${current.start}-${current.end}`;
  document.getElementById('prog-fill').style.width = pct + "%";
  document.getElementById('prog-pct').textContent = pct + "%";

  const next = SCHEDULE[idx + 1];
  if (next) {
    const toNext = toSec(next.start) - ns;
    document.getElementById('val-b').textContent = fmt(toNext);
    document.getElementById('desc-b').textContent = "Start: " + next.start;
  }

  const isLesson = current.type === 'lesson';
  document.getElementById('sdot').className = `sdot pulse ${isLesson ? 'bg-red' : 'bg-gold'}`;
  document.getElementById('prog-fill').style.background = isLesson ? 'var(--accent)' : 'var(--gold)';
}

setInterval(updateUI, 1000);
updateUI();
</script>
</body>
</html>
