<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Plan lekcji – SP45</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #22263a;
    --border: rgba(255,255,255,0.07);
    --text: #f0f0f0;
    --muted: #7a7f9a;
    --blue: #4f8ef7;
    --blue-dim: rgba(79,142,247,0.12);
    --green: #34d399;
    --green-dim: rgba(52,211,153,0.12);
    --amber: #fbbf24;
    --amber-dim: rgba(251,191,36,0.12);
  }

  html, body {
    width: 100%; height: 100%;
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    overflow: hidden;
  }

  body {
    display: grid;
    grid-template-rows: auto 1fr auto;
    grid-template-columns: 1fr 320px;
    height: 100vh;
  }

  /* TOP BAR */
  .topbar {
    grid-column: 1 / -1;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 28px;
    border-bottom: 0.5px solid var(--border);
    background: var(--surface);
  }

  .school-logo { display: flex; align-items: center; gap: 12px; }
  .logo-badge {
    width: 36px; height: 36px;
    background: var(--blue); border-radius: 9px;
    display: flex; align-items: center; justify-content: center;
    font-weight: 600; font-size: 14px; color: #fff;
  }
  .school-name { font-size: 14px; font-weight: 600; }
  .school-sub  { font-size: 11px; color: var(--muted); }

  .top-clock {
    font-family: 'DM Mono', monospace;
    font-size: 30px; font-weight: 500;
    letter-spacing: -0.03em; line-height: 1;
    text-align: center;
  }
  .top-date { font-size: 11px; color: var(--muted); text-align: center; margin-top: 2px; }

  .top-status { display: flex; align-items: center; gap: 10px; text-align: right; }
  .status-dot {
    width: 9px; height: 9px; border-radius: 50%;
    animation: pulse 1.4s ease-in-out infinite;
  }
  .status-dot.blue  { background: var(--blue); }
  .status-dot.green { background: var(--green); }
  .status-dot.amber { background: var(--amber); }
  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.4;transform:scale(1.4)} }
  .status-label { font-size: 15px; font-weight: 500; }
  .status-range { font-size: 11px; color: var(--muted); margin-top: 1px; }

  /* MAIN */
  .main {
    padding: 24px 28px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    overflow: hidden;
  }

  .big-counters {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
    flex-shrink: 0;
  }

  .big-card {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: 16px;
    padding: 22px 24px;
    position: relative;
    overflow: hidden;
  }
  .big-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; height: 3px;
    border-radius: 16px 16px 0 0;
  }
  .big-card.blue::before  { background: var(--blue); }
  .big-card.green::before { background: var(--green); }
  .big-card.amber::before { background: var(--amber); }
  .big-card.muted::before { background: var(--surface2); }

  .big-label {
    font-size: 10px; font-weight: 500;
    letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--muted); margin-bottom: 10px;
  }
  .big-val {
    font-family: 'DM Mono', monospace;
    font-size: 56px; font-weight: 500;
    letter-spacing: -0.04em; line-height: 1;
    margin-bottom: 6px;
  }
  .big-val.blue  { color: var(--blue); }
  .big-val.green { color: var(--green); }
  .big-val.amber { color: var(--amber); }
  .big-val.muted { color: var(--muted); }
  .big-sub { font-size: 12px; color: var(--muted); }

  /* PROGRESS */
  .progress-card {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: 16px;
    padding: 18px 22px;
    flex-shrink: 0;
  }
  .progress-header {
    display: flex; justify-content: space-between; align-items: baseline;
    margin-bottom: 10px;
  }
  .progress-title { font-size: 13px; font-weight: 500; }
  .progress-pct { font-family: 'DM Mono', monospace; font-size: 13px; color: var(--muted); }
  .progress-track { height: 8px; background: var(--surface2); border-radius: 999px; overflow: hidden; }
  .progress-fill { height: 100%; border-radius: 999px; transition: width 1s linear, background 0.3s; }
  .progress-times {
    display: flex; justify-content: space-between;
    margin-top: 7px; font-size: 11px; color: var(--muted);
    font-family: 'DM Mono', monospace;
  }

  /* NEXT UP */
  .next-card {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: 16px;
    padding: 14px 18px;
    display: flex; align-items: center; gap: 14px;
    flex-shrink: 0;
  }
  .next-icon {
    width: 42px; height: 42px; border-radius: 11px;
    display: flex; align-items: center; justify-content: center;
    font-size: 19px; flex-shrink: 0;
  }
  .next-icon.lesson { background: var(--blue-dim); }
  .next-icon.brk    { background: var(--green-dim); }
  .next-label { font-size: 10px; color: var(--muted); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 3px; }
  .next-name  { font-size: 16px; font-weight: 600; }
  .next-time  { font-size: 11px; color: var(--muted); font-family: 'DM Mono', monospace; margin-top: 2px; }

  /* SIDEBAR */
  .sidebar {
    border-left: 0.5px solid var(--border);
    background: var(--surface);
    overflow-y: auto;
  }
  .sidebar::-webkit-scrollbar { width: 3px; }
  .sidebar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .sidebar-header {
    padding: 14px 18px;
    font-size: 10px; font-weight: 500;
    letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--muted);
    border-bottom: 0.5px solid var(--border);
    position: sticky; top: 0;
    background: var(--surface); z-index: 1;
  }

  .sch-row {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 18px;
    border-bottom: 0.5px solid var(--border);
  }
  .sch-row:last-child { border-bottom: none; }
  .sch-row.active { background: var(--amber-dim); }
  .sch-row.past   { opacity: 0.32; }

  .dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
  .dot-lesson { background: var(--blue); }
  .dot-break  { background: var(--green); }
  .dot-now    { background: var(--amber); animation: pulse 1.2s ease-in-out infinite; }

  .sch-time {
    font-family: 'DM Mono', monospace;
    font-size: 10px; color: var(--muted); min-width: 94px;
  }
  .sch-name { font-size: 12px; flex: 1; }
  .badge {
    font-size: 9px; font-weight: 500;
    padding: 2px 6px; border-radius: 999px;
  }
  .badge-lesson { background: var(--blue-dim);  color: var(--blue); }
  .badge-break  { background: var(--green-dim); color: var(--green); }
  .badge-now    { background: var(--amber-dim); color: var(--amber); }

  /* BOTTOM */
  .bottombar {
    grid-column: 1 / -1;
    border-top: 0.5px solid var(--border);
    background: var(--surface);
    padding: 9px 28px;
    display: flex; justify-content: space-between; align-items: center;
  }
  .bottom-text { font-size: 11px; color: var(--muted); }
</style>
</head>
<body>

<header class="topbar">
  <div class="school-logo">
    <div class="logo-badge">SP</div>
    <div>
      <div class="school-name">Szkoła Podstawowa nr 45</div>
      <div class="school-sub">digitaltv.sp45.pl</div>
    </div>
  </div>
  <div>
    <div class="top-clock" id="clock">--:--:--</div>
    <div class="top-date" id="date-str"></div>
  </div>
  <div class="top-status">
    <div class="status-dot blue" id="status-dot"></div>
    <div>
      <div class="status-label" id="status-label">Ładowanie…</div>
      <div class="status-range" id="status-range"></div>
    </div>
  </div>
</header>

<main class="main">
  <div class="big-counters">
    <div class="big-card blue" id="card-a">
      <div class="big-label" id="lbl-a">—</div>
      <div class="big-val blue" id="val-a">—</div>
      <div class="big-sub" id="sub-a"></div>
    </div>
    <div class="big-card amber" id="card-b">
      <div class="big-label" id="lbl-b">—</div>
      <div class="big-val amber" id="val-b">—</div>
      <div class="big-sub" id="sub-b"></div>
    </div>
  </div>

  <div class="progress-card" id="prog-card">
    <div class="progress-header">
      <span class="progress-title" id="prog-title">Postęp</span>
      <span class="progress-pct" id="prog-pct">0%</span>
    </div>
    <div class="progress-track">
      <div class="progress-fill" id="prog-fill" style="width:0%;background:var(--blue)"></div>
    </div>
    <div class="progress-times">
      <span id="prog-start"></span>
      <span id="prog-end"></span>
    </div>
  </div>

  <div class="next-card" id="next-card">
    <div class="next-icon lesson" id="next-icon">📚</div>
    <div>
      <div class="next-label">Następnie</div>
      <div class="next-name" id="next-name">—</div>
      <div class="next-time" id="next-time"></div>
    </div>
  </div>
</main>

<aside class="sidebar">
  <div class="sidebar-header">Plan dnia</div>
  <div id="schedule-list"></div>
</aside>

<footer class="bottombar">
  <div class="bottom-text" id="bottom-left">—</div>
  <div class="bottom-text">Plan lekcji · rok szkolny 2025/2026</div>
</footer>

<script>
const SCHEDULE = [
  { type:'lesson', name:'1. lekcja',      start:'08:00', end:'08:50' },
  { type:'break',  name:'Przerwa',         start:'08:50', end:'09:00' },
  { type:'lesson', name:'2. lekcja',      start:'09:00', end:'09:45' },
  { type:'break',  name:'Przerwa',         start:'09:45', end:'09:55' },
  { type:'lesson', name:'3. lekcja',      start:'09:55', end:'10:40' },
  { type:'break',  name:'Przerwa (duża)', start:'10:40', end:'10:55' },
  { type:'lesson', name:'4. lekcja',      start:'10:55', end:'11:40' },
  { type:'break',  name:'Przerwa',         start:'11:40', end:'11:50' },
  { type:'lesson', name:'5. lekcja',      start:'11:50', end:'12:35' },
  { type:'break',  name:'Przerwa',         start:'12:35', end:'12:45' },
  { type:'lesson', name:'6. lekcja',      start:'12:45', end:'13:30' },
  { type:'break',  name:'Przerwa (duża)', start:'13:30', end:'13:50' },
  { type:'lesson', name:'7. lekcja',      start:'13:50', end:'14:35' },
  { type:'break',  name:'Przerwa',         start:'14:35', end:'14:45' },
  { type:'lesson', name:'8. lekcja',      start:'14:45', end:'15:30' },
  { type:'break',  name:'Przerwa',         start:'15:30', end:'15:40' },
];

const DAYS = ['Niedziela','Poniedziałek','Wtorek','Środa','Czwartek','Piątek','Sobota'];
const MONTHS = ['stycznia','lutego','marca','kwietnia','maja','czerwca','lipca','sierpnia','września','października','listopada','grudnia'];

function toSec(t) { const [h,m]=t.split(':').map(Number); return h*3600+m*60; }
function fmt(s) {
  if (s<=0) return '0:00';
  return Math.floor(s/60)+':'+String(s%60).padStart(2,'0');
}

function buildSchedule(idx) {
  const el = document.getElementById('schedule-list');
  el.innerHTML = '';
  const now = new Date();
  const ns = now.getHours()*3600+now.getMinutes()*60+now.getSeconds();
  SCHEDULE.forEach((slot, i) => {
    const isPast = toSec(slot.end) < ns && i !== idx;
    const row = document.createElement('div');
    row.className = 'sch-row'+(i===idx?' active':'')+(isPast?' past':'');
    const dot = document.createElement('div');
    dot.className = 'dot '+(i===idx?'dot-now':slot.type==='lesson'?'dot-lesson':'dot-break');
    const time = document.createElement('span');
    time.className = 'sch-time';
    time.textContent = slot.start+' – '+slot.end;
    const name = document.createElement('span');
    name.className = 'sch-name';
    name.textContent = slot.name;
    const badge = document.createElement('span');
    badge.className = 'badge '+(i===idx?'badge-now':slot.type==='lesson'?'badge-lesson':'badge-break');
    badge.textContent = i===idx?'teraz':slot.type==='lesson'?'lekcja':'przerwa';
    row.appendChild(dot); row.appendChild(time); row.appendChild(name); row.appendChild(badge);
    el.appendChild(row);
  });
}

function setCard(id, lblId, subId, cardId, label, val, cls, sub) {
  document.getElementById(lblId).textContent = label;
  const v = document.getElementById(id); v.textContent = val; v.className = 'big-val '+cls;
  document.getElementById(subId).textContent = sub||'';
  document.getElementById(cardId).className = 'big-card '+cls;
}

function tick() {
  const now = new Date();
  const ns = now.getHours()*3600+now.getMinutes()*60+now.getSeconds();

  document.getElementById('clock').textContent =
    String(now.getHours()).padStart(2,'0')+':'+String(now.getMinutes()).padStart(2,'0')+':'+String(now.getSeconds()).padStart(2,'0');
  document.getElementById('date-str').textContent =
    DAYS[now.getDay()]+', '+now.getDate()+' '+MONTHS[now.getMonth()]+' '+now.getFullYear();

  let idx = -1;
  for (let i=0;i<SCHEDULE.length;i++) {
    if (ns>=toSec(SCHEDULE[i].start)&&ns<toSec(SCHEDULE[i].end)) { idx=i; break; }
  }

  if (idx===-1) {
    const ni = SCHEDULE.findIndex(s=>toSec(s.start)>ns);
    document.getElementById('prog-card').style.display = 'none';
    document.getElementById('next-card').style.display = 'none';
    if (ni===-1) {
      document.getElementById('status-label').textContent='Koniec zajęć';
      document.getElementById('status-range').textContent='Do zobaczenia jutro!';
      document.getElementById('status-dot').className='status-dot green';
      setCard('val-a','lbl-a','sub-a','card-a','—','—','muted','');
      setCard('val-b','lbl-b','sub-b','card-b','—','—','muted','');
      document.getElementById('bottom-left').textContent='Zajęcia zakończone';
    } else {
      const secTo=toSec(SCHEDULE[ni].start)-ns;
      document.getElementById('status-label').textContent='Przed lekcjami';
      document.getElementById('status-range').textContent='Pierwsza lekcja o '+SCHEDULE[0].start;
      document.getElementById('status-dot').className='status-dot amber';
      setCard('val-a','lbl-a','sub-a','card-a','Do pierwszej lekcji',fmt(secTo),'amber',SCHEDULE[0].start+' – '+SCHEDULE[0].end);
      setCard('val-b','lbl-b','sub-b','card-b','—','—','muted','');
      document.getElementById('bottom-left').textContent='Zajęcia jeszcze się nie rozpoczęły';
    }
    buildSchedule(-1); return;
  }

  const slot=SCHEDULE[idx];
  const startS=toSec(slot.start), endS=toSec(slot.end);
  const remain=endS-ns;
  const pct=Math.round(((ns-startS)/(endS-startS))*100);

  document.getElementById('status-label').textContent=slot.name;
  document.getElementById('status-range').textContent=slot.start+' – '+slot.end;

  document.getElementById('prog-card').style.display='';
  document.getElementById('prog-title').textContent=slot.type==='lesson'?'Postęp lekcji':'Postęp przerwy';
  document.getElementById('prog-pct').textContent=pct+'%';
  document.getElementById('prog-fill').style.width=pct+'%';
  document.getElementById('prog-start').textContent=slot.start;
  document.getElementById('prog-end').textContent=slot.end;

  const nextSlot=SCHEDULE[idx+1];
  if (nextSlot) {
    document.getElementById('next-card').style.display='flex';
    document.getElementById('next-name').textContent=nextSlot.name;
    document.getElementById('next-time').textContent=nextSlot.start+' – '+nextSlot.end;
    document.getElementById('next-icon').className='next-icon '+(nextSlot.type==='lesson'?'lesson':'brk');
    document.getElementById('next-icon').textContent=nextSlot.type==='lesson'?'📚':'☕';
  } else {
    document.getElementById('next-card').style.display='none';
  }

  const lessonsLeft=SCHEDULE.slice(idx+1).filter(s=>s.type==='lesson').length;
  document.getElementById('bottom-left').textContent='Pozostałe lekcje dzisiaj: '+lessonsLeft;

  if (slot.type==='lesson') {
    document.getElementById('status-dot').className='status-dot blue';
    document.getElementById('prog-fill').style.background='var(--blue)';
    setCard('val-a','lbl-a','sub-a','card-a','Do końca lekcji',fmt(remain),'blue',slot.end);
    const nb=SCHEDULE.slice(idx+1).find(s=>s.type==='break');
    if (nb) setCard('val-b','lbl-b','sub-b','card-b','Do przerwy',fmt(toSec(nb.start)-ns),'amber',nb.start+' – '+nb.end);
    else setCard('val-b','lbl-b','sub-b','card-b','—','—','muted','');
  } else {
    document.getElementById('status-dot').className='status-dot green';
    document.getElementById('prog-fill').style.background='var(--green)';
    setCard('val-a','lbl-a','sub-a','card-a','Przerwa kończy się',fmt(remain),'green',slot.end);
    const nl=SCHEDULE.slice(idx+1).find(s=>s.type==='lesson');
    if (nl) setCard('val-b','lbl-b','sub-b','card-b','Do lekcji',fmt(toSec(nl.start)-ns),'amber',nl.start+' – '+nl.end);
    else setCard('val-b','lbl-b','sub-b','card-b','—','—','muted','');
  }

  buildSchedule(idx);
}

tick();
setInterval(tick,1000);
</script>
</body>
</html>
