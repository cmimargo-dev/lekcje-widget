<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Plan lekcji – SP45</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #1a0a0a;
    --surface:   #2a1010;
    --surface2:  #3a1818;
    --border:    rgba(255,255,255,0.07);
    --text:      #f5eaea;
    --muted:     #a07070;
    --accent:    #ff6b6b;
    --accent2:   #ffb3b3;
    --gold:      #ffd166;
    --gold-dim:  rgba(255,209,102,0.15);
    --red-dim:   rgba(255,107,107,0.12);
  }

  html, body {
    width: 100%; height: 100%;
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    overflow: hidden;
  }

  body {
    display: flex;
    flex-direction: column;
    height: 100vh;
  }

  /* TOP BAR */
  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 36px;
    background: var(--surface);
    border-bottom: 0.5px solid var(--border);
    flex-shrink: 0;
  }

  .school { display: flex; align-items: center; gap: 12px; }
  .logo {
    width: 38px; height: 38px; border-radius: 10px;
    background: var(--accent);
    display: flex; align-items: center; justify-content: center;
    font-weight: 700; font-size: 14px; color: #1a0a0a;
  }
  .school-name { font-size: 15px; font-weight: 600; color: var(--text); }
  .school-sub  { font-size: 11px; color: var(--muted); }

  .clock {
    font-family: 'DM Mono', monospace;
    font-size: 32px; font-weight: 500;
    color: var(--accent); letter-spacing: -0.03em;
  }

  .status-pill {
    display: flex; align-items: center; gap: 8px;
    background: var(--red-dim);
    border: 0.5px solid rgba(255,107,107,0.2);
    border-radius: 999px;
    padding: 7px 18px;
  }
  .sdot {
    width: 8px; height: 8px; border-radius: 50%;
    animation: pulse 1.4s ease-in-out infinite;
  }
  .sdot-red  { background: var(--accent); }
  .sdot-gold { background: var(--gold); }
  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.4;transform:scale(1.5)} }
  .status-text { font-size: 14px; font-weight: 500; color: var(--text); }

  /* MAIN */
  .main {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 24px;
    padding: 28px 36px;
  }

  /* TWO BIG CARDS */
  .cards {
    display: flex;
    gap: 20px;
    width: 100%;
    max-width: 900px;
  }

  .big-card {
    flex: 1;
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: 20px;
    padding: 34px 32px 28px;
    position: relative;
    overflow: hidden;
  }

  .big-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; height: 3px;
    border-radius: 20px 20px 0 0;
  }
  .card-red::before  { background: var(--accent); }
  .card-gold::before { background: var(--gold); }

  .card-emoji { font-size: 26px; margin-bottom: 12px; display: block; }

  .card-label {
    font-size: 11px; font-weight: 500;
    letter-spacing: 0.12em; text-transform: uppercase;
    color: var(--muted); margin-bottom: 10px;
  }

  .card-val {
    font-family: 'DM Mono', monospace;
    font-size: 80px; font-weight: 500;
    letter-spacing: -0.04em; line-height: 1;
  }
  .val-red  { color: var(--accent); }
  .val-gold { color: var(--gold); }
  .val-muted{ color: var(--muted); }

  .card-desc {
    font-size: 13px; color: var(--muted); margin-top: 10px;
  }

  /* PROGRESS */
  .prog-wrap {
    width: 100%; max-width: 900px;
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: 16px;
    padding: 18px 26px;
  }

  .prog-head {
    display: flex; justify-content: space-between;
    margin-bottom: 10px;
    font-size: 13px;
  }
  .prog-title { font-weight: 500; color: var(--text); }
  .prog-pct   { font-family: 'DM Mono', monospace; color: var(--muted); }

  .prog-track {
    height: 10px; background: var(--surface2);
    border-radius: 999px; overflow: hidden;
  }
  .prog-fill {
    height: 100%; border-radius: 999px;
    transition: width 1s linear, background 0.3s;
    background: var(--accent);
  }

  /* BOTTOM */
  .bottombar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 36px;
    background: var(--surface);
    border-top: 0.5px solid var(--border);
    flex-shrink: 0;
  }
  .bot { font-size: 11px; color: var(--muted); }
</style>
</head>
<body>

<div class="topbar">
  <div class="school">
    <div class="logo">SP</div>
    <div>
      <div class="school-name">Szkoła Podstawowa nr 45</div>
      <div class="school-sub">digitaltv.sp45.pl</div>
    </div>
  </div>
  <div class="clock" id="clock">--:--:--</div>
  <div class="status-pill">
    <div class="sdot sdot-red" id="sdot"></div>
    <div class="status-text" id="status-text">Ładowanie…</div>
  </div>
</div>

<div class="main">
  <div class="cards">
    <div class="big-card card-red" id="card-a">
      <span class="card-emoji" id="emoji-a">📚</span>
      <div class="card-label" id="lbl-a">Do końca lekcji</div>
      <div class="card-val val-red" id="val-a">--:--</div>
      <div class="card-desc" id="desc-a"></div>
    </div>
    <div class="big-card card-gold" id="card-b">
      <span class="card-emoji" id="emoji-b">☕</span>
      <div class="card-label" id="lbl-b">Do przerwy</div>
      <div class="card-val val-gold" id="val-b">--:--</div>
      <div class="card-desc" id="desc-b"></div>
    </div>
  </div>

  <div class="prog-wrap">
    <div class="prog-head">
      <span class="prog-title" id="prog-title">Postęp</span>
      <span class="prog-pct" id="prog-pct">0%</span>
    </div>
    <div class="prog-track">
      <div class="prog-fill" id="prog-fill" style="width:0%"></div>
    </div>
  </div>
</div>

<div class="bottombar">
  <span class="bot" id="bot-left">—</span>
  <span class="bot">rok szkolny 2025/2026</span>
</div>

<script>
const SCHEDULE = [
  { type:'lesson', name:'1. lekcja',      start:'08:00', end:'08:50' },
  { type:'break',  name:'Przerwa',         start:'08:50', end:'09:00' },
  { type:'lesson', name:'2. lekcja',      start:'09:00', end:'09:45' },
  { type:'break',  name:'Przerwa',         start:'09:45', end:'09:55' },
  { type:'lesson', name:'3. lekcja',      start:'09:55', end:'10:40' },
  { type:'break',  name:'Przerwa (duża)', start:'10:40', end:'10:55' },
  { type:'lesson', name:'4. lekcja',      start:'10:55', end:'11:40' },
  { type:'break',  name:'Przerwa',         start:'11:40', end:'11:50' },
  { type:'lesson', name:'5. lekcja',      start:'11:50', end:'12:35' },
  { type:'break',  name:'Przerwa',         start:'12:35', end:'12:45' },
  { type:'lesson', name:'6. lekcja',      start:'12:45', end:'13:30' },
  { type:'break',  name:'Przerwa (duża)', start:'13:30', end:'13:50' },
  { type:'lesson', name:'7. lekcja',      start:'13:50', end:'14:35' },
  { type:'break',  name:'Przerwa',         start:'14:35', end:'14:45' },
  { type:'lesson', name:'8. lekcja',      start:'14:45', end:'15:30' },
  { type:'break',  name:'Przerwa',         start:'15:30', end:'15:40' },
];

function toSec(t) { const [h,m]=t.split(':').map(Number); return h*3600+m*60; }
function fmt(s) {
  if (s<=0) return '0:00';
  return Math.floor(s/60)+':'+String(s%60).padStart(2,'0');
}

function setA(label, val, cls, emoji, desc) {
  document.getElementById('lbl-a').textContent = label;
  const v = document.getElementById('val-a'); v.textContent = val; v.className = 'card-val '+cls;
  document.getElementById('emoji-a').textContent = emoji;
  document.getElementById('desc-a').textContent = desc||'';
  document.getElementById('card-a').className = 'big-card '+(cls==='val-gold'?'card-gold':'card-red');
}
function setB(label, val, cls, emoji, desc) {
  document.getElementById('lbl-b').textContent = label;
  const v = document.getElementById('val-b'); v.textContent = val; v.className = 'card-val '+cls;
  document.getElementById('emoji-b').textContent = emoji;
  document.getElementById('desc-b').textContent = desc||'';
  document.getElementById('card-b').className = 'big-card '+(cls==='val-gold'?'card-gold':'card-red');
}

function tick() {
  const now = new Date();
  const ns = now.getHours()*3600+now.getMinutes()*60+now.getSeconds();

  document.getElementById('clock').textContent =
    String(now.getHours()).padStart(2,'0')+':'+
    String(now.getMinutes()).padStart(2,'0')+':'+
    String(now.getSeconds()).padStart(2,'0');

  let idx = -1;
  for (let i=0;i<SCHEDULE.length;i++) {
    if (ns>=toSec(SCHEDULE[i].start)&&ns<toSec(SCHEDULE[i].end)) { idx=i; break; }
  }

  if (idx===-1) {
    const ni = SCHEDULE.findIndex(s=>toSec(s.start)>ns);
    document.getElementById('prog-fill').style.width='0%';
    document.getElementById('prog-pct').textContent='0%';
    if (ni===-1) {
      document.getElementById('sdot').className='sdot sdot-red';
      document.getElementById('status-text').textContent='Koniec zajęć';
      document.getElementById('prog-title').textContent='Koniec zajęć na dziś';
      setA('Koniec zajęć','🎉','val-muted','🎉','Do zobaczenia jutro!');
      setB('—','—','val-muted','','');
      document.getElementById('bot-left').textContent='Wszystkie lekcje zakończone';
    } else {
      const st=toSec(SCHEDULE[ni].start)-ns;
      document.getElementById('sdot').className='sdot sdot-gold';
      document.getElementById('status-text').textContent='Przed lekcjami';
      document.getElementById('prog-title').textContent='Do rozpoczęcia zajęć';
      setA('Do pierwszej lekcji',fmt(st),'val-gold','⏳','Lekcje zaczynają się o '+SCHEDULE[0].start);
      setB('—','—','val-muted','','');
      document.getElementById('bot-left').textContent='Zajęcia zaczynają się o '+SCHEDULE[0].start;
    }
    return;
  }

  const slot=SCHEDULE[idx];
  const startS=toSec(slot.start), endS=toSec(slot.end);
  const remain=endS-ns;
  const pct=Math.round(((ns-startS)/(endS-startS))*100);

  document.getElementById('prog-pct').textContent=pct+'%';
  document.getElementById('prog-fill').style.width=pct+'%';

  const lessonsLeft=SCHEDULE.slice(idx+1).filter(s=>s.type==='lesson').length;
  document.getElementById('bot-left').textContent='Pozostałe lekcje dzisiaj: '+lessonsLeft;

  if (slot.type==='lesson') {
    document.getElementById('sdot').className='sdot sdot-red';
    document.getElementById('status-text').textContent=slot.name;
    document.getElementById('prog-title').textContent='Postęp lekcji';
    document.getElementById('prog-fill').style.background='var(--accent)';
    setA('Do końca lekcji', fmt(remain), 'val-red', '📚', slot.name+' · '+slot.start+' – '+slot.end);
    const nb=SCHEDULE.slice(idx+1).find(s=>s.type==='break');
    if (nb) setB('Do przerwy', fmt(toSec(nb.start)-ns), 'val-gold', '☕', nb.name+' o '+nb.start);
    else setB('—','—','val-muted','','');
  } else {
    document.getElementById('sdot').className='sdot sdot-gold';
    document.getElementById('status-text').textContent=slot.name;
    document.getElementById('prog-title').textContent='Postęp przerwy';
    document.getElementById('prog-fill').style.background='var(--gold)';
    setA('Przerwa kończy się za', fmt(remain), 'val-gold', '☕', slot.name+' · do '+slot.end);
    const nl=SCHEDULE.slice(idx+1).find(s=>s.type==='lesson');
    if (nl) setB('Do lekcji', fmt(toSec(nl.start)-ns), 'val-red', '📚', nl.name+' o '+nl.start);
    else setB('—','—','val-muted','','');
  }
}

tick();
setInterval(tick,1000);
</script>
</body>
</html>
