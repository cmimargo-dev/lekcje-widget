<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Widget SP45</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  /* RESET I PODSTAWY */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg-glass:  rgba(30, 12, 12, 0.98); /* Bardziej nieprzezroczyste dla czytelności */
    --surface:   #2d1414;
    --border:    rgba(255,255,255,0.1);
    --text:      #f5eaea;
    --muted:     #a07070;
    --accent:    #ff6b6b;
    --gold:      #ffd166;
  }

  /* KLUCZOWE: Usunięcie centrowania pionowego */
  html, body {
    width: 100%;
    height: 100%;
    background: transparent; /* Przezroczyste tło body */
    font-family: 'DM Sans', sans-serif;
    overflow: hidden;
  }

  body {
    display: block; /* Zmiana z flex na block, aby zawartość naturalnie zaczynała się od góry */
  }

  /* KONTENER PRZYKLEJONY DO GÓRY */
  .widget-container {
    background: var(--bg-glass);
    backdrop-filter: blur(15px);
    border-bottom: 2px solid var(--accent);
    width: 100%;
    margin: 0; /* Wymusza brak odstępu od góry strony */
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  }

  /* GRID DOPASOWANY DO MAŁYCH OKIEN */
  .grid {
    display: grid;
    grid-template-columns: 1fr; /* Domyślnie jeden pod drugim (dla wąskich widgetów) */
    gap: 8px;
  }

  /* Jeśli okno ma więcej niż 450px, ustaw obok siebie */
  @media (min-width: 450px) {
    .grid { grid-template-columns: 1fr 1fr; }
  }

  .card {
    background: var(--surface);
    border-radius: 12px;
    padding: 12px;
    border: 1px solid var(--border);
  }

  .label {
    font-size: 10px;
    text-transform: uppercase;
    color: var(--muted);
    letter-spacing: 0.05em;
    margin-bottom: 4px;
  }

  .value {
    font-family: 'DM Mono', monospace;
    font-size: 42px; /* Stała czytelna wielkość */
    font-weight: 700;
    line-height: 1;
    color: var(--accent);
  }

  .footer-text {
    font-size: 11px;
    color: var(--text);
    margin-top: 4px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  /* PASEK POSTĘPU */
  .progress-box {
    background: rgba(0,0,0,0.3);
    border-radius: 10px;
    padding: 10px;
    border: 1px solid var(--border);
  }

  .progress-header {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    margin-bottom: 6px;
  }

  .status-tag {
    display: flex;
    align-items: center;
    gap: 6px;
    font-weight: 600;
  }

  .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--accent);
  }

  .pulse { animation: blink 1.5s infinite; }
  @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

  .bar-bg {
    height: 8px;
    background: #000;
    border-radius: 4px;
    overflow: hidden;
  }

  .bar-fill {
    height: 100%;
    width: 0%;
    background: var(--accent);
    transition: width 1s linear;
  }

  .small-info {
    font-size: 9px;
    color: var(--muted);
    text-align: center;
    margin-top: 4px;
  }
</style>
</head>
<body>

<div class="widget-container">
  <div class="grid">
    <!-- KARTA A -->
    <div class="card">
      <div class="label" id="lbl-a">Pozostało</div>
      <div class="value" id="val-a">--:--</div>
      <div class="footer-text">
        <span id="emoji-a">📚</span>
        <span id="desc-a">...</span>
      </div>
    </div>

    <!-- KARTA B -->
    <div class="card" style="border-color: rgba(255,209,102,0.2)">
      <div class="label" id="lbl-b">Następnie</div>
      <div class="value" id="val-b" style="color: var(--gold); font-size: 32px; margin-top: 6px;">--:--</div>
      <div class="footer-text" style="color: var(--muted)">
        <span id="emoji-b">☕</span>
        <span id="desc-b">...</span>
      </div>
    </div>
  </div>

  <div class="progress-box">
    <div class="progress-header">
      <div class="status-tag">
        <div class="dot pulse" id="sdot"></div>
        <span id="status-text">Inicjalizacja...</span>
      </div>
      <span id="pct-text" style="font-family: 'DM Mono'">0%</span>
    </div>
    <div class="bar-bg">
      <div class="bar-fill" id="fill"></div>
    </div>
  </div>

  <div class="small-info">digitaltv.sp45.pl</div>
</div>

<script>
const SCHEDULE = [
  { type:'lesson', name:'1. lekcja',      start:'08:00', end:'08:50' },
  { type:'break',  name:'Przerwa',         start:'08:50', end:'09:00' },
  { type:'lesson', name:'2. lekcja',      start:'09:00', end:'09:45' },
  { type:'break',  name:'Przerwa',         start:'09:45', end:'09:55' },
  { type:'lesson', name:'3. lekcja',      start:'09:55', end:'10:40' },
  { type:'break',  name:'Przerwa (duża)', start:'10:40', end:'10:55' },
  { type:'lesson', name:'4. lekcja',      start:'10:55', end:'11:40' },
  { type:'break',  name:'Przerwa',         start:'11:40', end:'11:50' },
  { type:'lesson', name:'5. lekcja',      start:'11:50', end:'12:35' },
  { type:'break',  name:'Przerwa',         start:'12:35', end:'12:45' },
  { type:'lesson', name:'6. lekcja',      start:'12:45', end:'13:30' },
  { type:'break',  name:'Przerwa (duża)', start:'13:30', end:'13:50' },
  { type:'lesson', name:'7. lekcja',      start:'13:50', end:'14:35' },
  { type:'break',  name:'Przerwa',         start:'14:35', end:'14:45' },
  { type:'lesson', name:'8. lekcja',      start:'14:45', end:'15:30' },
  { type:'break',  name:'Przerwa',         start:'15:30', end:'15:40' },
];

function toSec(t) { const [h,m]=t.split(':').map(Number); return h*3600+m*60; }
function fmt(s) {
  if (s<=0) return '0:00';
  const m = Math.floor(s/60);
  const sec = s%60;
  return m + ':' + String(sec).padStart(2,'0');
}

function update() {
  const now = new Date();
  const ns = now.getHours()*3600 + now.getMinutes()*60 + now.getSeconds();

  let idx = SCHEDULE.findIndex(s => ns >= toSec(s.start) && ns < toSec(s.end));

  if (idx === -1) {
    const nextIdx = SCHEDULE.findIndex(s => toSec(s.start) > ns);
    if (nextIdx === -1) {
      document.getElementById('val-a').textContent = "KONIEC";
      document.getElementById('status-text').textContent = "Po lekcjach";
      document.getElementById('fill').style.width = "100%";
    } else {
      const wait = toSec(SCHEDULE[nextIdx].start) - ns;
      document.getElementById('val-a').textContent = fmt(wait);
      document.getElementById('status-text').textContent = "Przed lekcjami";
    }
    return;
  }

  const current = SCHEDULE[idx];
  const remain = toSec(current.end) - ns;
  const total = toSec(current.end) - toSec(current.start);
  const pct = Math.floor(((total - remain) / total) * 100);

  document.getElementById('status-text').textContent = current.name;
  document.getElementById('val-a').textContent = fmt(remain);
  document.getElementById('desc-a').textContent = `${current.start}-${current.end}`;
  document.getElementById('fill').style.width = pct + "%";
  document.getElementById('pct-text').textContent = pct + "%";

  const next = SCHEDULE[idx + 1];
  if (next) {
    const toNext = toSec(next.start) - ns;
    document.getElementById('val-b').textContent = fmt(toNext);
    document.getElementById('desc-b').textContent = "Start: " + next.start;
  }

  const isLesson = current.type === 'lesson';
  document.getElementById('sdot').style.background = isLesson ? 'var(--accent)' : 'var(--gold)';
  document.getElementById('fill').style.background = isLesson ? 'var(--accent)' : 'var(--gold)';
}

setInterval(update, 1000);
update();
</script>

</body>
</html>
